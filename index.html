	<script>
		function initializeDataTable() {
			var dataSrc = "";

			var datatable = $('#myTable').DataTable({
				data: dataSrc,
				columns: [
					null,
					null,
					null,
					null,
					null,
					{
						data: null,
						className: "dt-center editor-edit",
						defaultContent: '<i class="fas fa-pencil-alt" style="cursor: pointer;"/>',
						orderable: false
					},
					{
						data: null,
						className: "dt-center editor-delete",
						defaultContent: '<i class="fas fa-trash-alt" style="cursor: pointer;"/>',
						orderable: false
					}
				],
				scrollY: "65vh",
				scrollCollapse: true,
				paging: false,
				info: false,
				buttons: true,
				language: {
					search: "",
					searchPlaceholder: window.t ? window.t('searchPlaceholder') : 'Search inventory',
					emptyTable: window.t ? window.t('emptyTable') : "Please select 'LOAD DATA' or 'NEW DATA'."
				},
				dom: '<"pull-left"f><"pull-right"B>tip',
				buttons: [
					{
						text: window.t ? window.t('addNewItemButton') : 'ADD NEW ITEM',
						action: function () {
							$('#addModal').modal('toggle');
						}
					},
					{
						text: window.t ? window.t('saveDataButton') : 'SAVE DATA',
						action: function (e, dt) {
							var data = dt.buttons.exportData();
							$.fn.dataTable.fileSave(
								new Blob([JSON.stringify(data)]),
								'DB.txt'
							);
						}
					},
					{
						text: window.t ? window.t('newDataButton') : 'NEW DATA',
						action: function () {
							$('#addModal').modal('toggle');
						}
					},
					{
						text: window.t ? window.t('loadDataButton') : 'LOAD DATA',
						action: function () {
							document.getElementById('upload_data').click();
						}
					}
				]
			});

			var a = null;
			var b = null;
			var buttonNodes = datatable.buttons().nodes().toArray();
			var addNewItemBtn = buttonNodes[0];
			var saveDataBtn = buttonNodes[1];
			var newDataBtn = buttonNodes[2];
			var loadDataBtn = buttonNodes[3];

			$(addNewItemBtn).addClass('add_button').prop('hidden', true);
			$(saveDataBtn).addClass('data_button').prop('hidden', true);
			$(newDataBtn).addClass('add_button').prop('hidden', false);
			$(loadDataBtn).addClass('data_button').prop('hidden', false);

			function showEmptyState() {
				$(addNewItemBtn).prop('hidden', true);
				$(saveDataBtn).prop('hidden', true);
				$(loadDataBtn).prop('hidden', false);
				$(newDataBtn).prop('hidden', false);
				$('#empty_animation').attr('hidden', false);
			}

			function showDataState() {
				$(addNewItemBtn).prop('hidden', false);
				$(saveDataBtn).prop('hidden', false);
				$(loadDataBtn).prop('hidden', true);
				$(newDataBtn).prop('hidden', true);
				$('#empty_animation').attr('hidden', true);
			}

			function delete_Row(a) {
				datatable.row($(a).parents('tr')).remove().draw();
				if (datatable.rows().count() === 0) {
					showEmptyState();
				}
			}

			$('#myTable').on('click', 'td.editor-delete', function () {
				a = this;
				$('#deleteModal').modal('toggle');
			});

			$('#delete_button').off('click.inventory').on('click.inventory', function () {
				if (a) delete_Row(a);
			});

			$('#myTable').on('click', 'td.editor-edit', function () {
				b = this;
				$('#edit_data').find('input[id="itemname"]').val(datatable.row(b).data()[0]);
				$('#edit_data').find('input[id="quantity"]').val(datatable.row(b).data()[1]);
				$('#edit_data').find('input[id="type"]').val(datatable.row(b).data()[2]);
				$('#edit_data').find('input[id="unit_price"]').val(datatable.row(b).data()[3]);
				$('#edit_data').find('input[id="total_price"]').val(datatable.row(b).data()[4]);
				$('#editModal').modal('toggle');
			});

			$('#edit_data').off('submit.inventory').on('submit.inventory', function (event) {
				event.preventDefault();
				var final_quantity = parseFloat($('#edit_data').find('input[id="quantity"]').val().replace(/[^0-9.]/g, '')) || 0;
				$('#edit_data').find('input[id="quantity"]').val(final_quantity.toFixed(0));
				var final_unit = parseFloat($('#edit_data').find('input[id="unit_price"]').val().replace(/[^0-9.]/g, '')) || 0;
				$('#edit_data').find('input[id="unit_price"]').val('RM ' + final_unit.toFixed(2));
				var newData = [
					$('#edit_data').find('input[id="itemname"]').val(),
					$('#edit_data').find('input[id="quantity"]').val(),
					$('#edit_data').find('input[id="type"]').val(),
					$('#edit_data').find('input[id="unit_price"]').val(),
					$('#edit_data').find('input[id="total_price"]').val()
				];
				datatable.row(b).data(newData).draw();
				$('#editModal').modal('toggle');
				$('#updateConfirmationModal').modal('toggle');
			});

			$('#add_data').off('submit.inventory').on('submit.inventory', function (event) {
				event.preventDefault();
				var final_quantity = parseFloat($('#add_data').find('input[id="quantity"]').val().replace(/[^0-9.]/g, '')) || 0;
				$('#add_data').find('input[id="quantity"]').val(final_quantity.toFixed(0));
				var final_unit = parseFloat($('#add_data').find('input[id="unit_price"]').val().replace(/[^0-9.]/g, '')) || 0;
				$('#add_data').find('input[id="unit_price"]').val('RM ' + final_unit.toFixed(2));
				var newData = [
					$('#add_data').find('input[id="itemname"]').val(),
					$('#add_data').find('input[id="quantity"]').val(),
					$('#add_data').find('input[id="type"]').val(),
					$('#add_data').find('input[id="unit_price"]').val(),
					$('#add_data').find('input[id="total_price"]').val()
				];
				datatable.row.add(newData).draw();
				$('#addModal').modal('toggle');
				$('#addConfirmationModal').modal('toggle');
				showDataState();
				$('#add_data').find('input[id="itemname"]').val('');
				$('#add_data').find('input[id="quantity"]').val('');
				$('#add_data').find('input[id="type"]').val('');
				$('#add_data').find('input[id="unit_price"]').val('RM ');
				$('#add_data').find('input[id="total_price"]').val('RM ');
			});

			$('#edit_data, #add_data').find('input[id="quantity"]').off('keyup.inventory').on('keyup.inventory', function () {
				var form = $(this).closest('form');
				var quantity_no = $(this).val().replace(/[^0-9.]/g, '');
				$(this).val(quantity_no);
				if (quantity_no.replace(/[^0-9.]/g, '') !== '') {
					var unit = form.find('input[id="unit_price"]').val().replace(/[^0-9.]/g, '');
					var total = unit * quantity_no;
					form.find('input[id="total_price"]').val('RM ' + total.toFixed(2));
				}
			});

			$('#edit_data, #add_data').find('input[id="unit_price"]').off('keyup.inventory').on('keyup.inventory', function () {
				var form = $(this).closest('form');
				var sanitized = $(this).val().replace(/[^0-9.]/g, '');
				$(this).val('RM ' + sanitized);
				var quantity_no = form.find('input[id="quantity"]').val();
				if (quantity_no.replace(/[^0-9.]/g, '') === '') {
					form.find('input[id="quantity"]').val(0);
					quantity_no = 0;
				}
				var total = sanitized * quantity_no;
				form.find('input[id="total_price"]').val('RM ' + total.toFixed(2));
			});

			function readSingleFile(e) {
				var file = e.target.files[0];
				if (!file) return;
				var reader = new FileReader();
				reader.onload = function (e) {
					displayContents(e.target.result);
				};
				reader.readAsText(file);
			}

			function displayContents(contents) {
				dataSrc = JSON.parse(contents.split('"body":')[1].split('}')[0]);
				$('#myTable').dataTable().fnClearTable();
				$('#myTable').dataTable().fnAddData(dataSrc);
				showDataState();
				document.getElementById('upload_data').value = "";
			}

			document.getElementById('upload_data').removeEventListener('change', readSingleFile, false);
			document.getElementById('upload_data').addEventListener('change', readSingleFile, false);

			$('.menu_button').hover(function () {
				$(this).find('.square_bg').addClass('menu_select_hover');
			}, function () {
				$(this).find('.square_bg').removeClass('menu_select_hover');
			});
		}
	</script>
</head>
